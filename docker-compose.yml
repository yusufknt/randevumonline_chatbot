version: '3.8'

services:
  mongodb:
    image: mongo:8.0
    container_name: randevum_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  api:
    build: .
    container_name: randevum_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB=randevum_chatbot
    env_file:
      - .env
    volumes:
      # Geliştirme esnasında kod değişikliklerinin anında yansıması için (Hot Reload):
      - ./app:/code/app
      - ./db:/code/db
      - ./scripts:/code/scripts
      - ./secrets:/code/secrets
      - ./flow.json:/code/flow.json
    depends_on:
      - mongodb
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongodb_data:
